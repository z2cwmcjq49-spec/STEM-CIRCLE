<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>هندسة الدائرة الذكية</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>هندسة الدائرة الذكية</h1>

<div class="menu">

<button class="mainBtn"
onclick="openPopup('stretchPopup')">

التمدد الهندسي

</button>


<button class="mainBtn"
onclick="openPopup('circumferencePopup')">

حساب محيط الدائرة

</button>


<button class="mainBtn"
onclick="openPopup('arcPopup')">

حساب طول القوس

</button>

</div>



<!-- =========================
     نافذة التمدد
========================= -->

<div class="popup"
id="stretchPopup">

<div class="popupContent">

<h2>التمدد الهندسي</h2>

<input
type="number"
id="stretchFactor"
placeholder="أدخل معامل التمدد">

<button class="calcBtn"
onclick="calculateStretch()">

تمثيل التمدد

</button>

<div class="result"
id="stretchResult"></div>

<canvas
id="drawCanvas"
width="420"
height="260">

</canvas>

<button class="closeBtn"
onclick="closePopup('stretchPopup')">

إغلاق

</button>

</div>
</div>



<!-- =========================
     نافذة محيط الدائرة
========================= -->

<div class="popup"
id="circumferencePopup">

<div class="popupContent">

<h2>محيط الدائرة</h2>

<input
type="number"
id="diameterValue"
placeholder="أدخل القطر">

<button class="calcBtn"
onclick="calculateCircumference()">

احسب المحيط

</button>

<div class="result"
id="circumferenceResult"></div>

<button class="closeBtn"
onclick="closePopup('circumferencePopup')">

إغلاق

</button>

</div>
</div>



<!-- =========================
     نافذة طول القوس
========================= -->

<div class="popup"
id="arcPopup">

<div class="popupContent">

<h2>طول القوس</h2>

<input
type="number"
id="radiusValue"
placeholder="أدخل نصف القطر">

<input
type="number"
id="centralAngleValue"
placeholder="أدخل الزاوية المركزية">

<button class="calcBtn"
onclick="calculateArc()">

احسب طول القوس

</button>

<div class="result"
id="arcResult"></div>

<button class="closeBtn"
onclick="closePopup('arcPopup')">

إغلاق

</button>

</div>
</div>

<script src="script.js"></script>

</body>
</html>
